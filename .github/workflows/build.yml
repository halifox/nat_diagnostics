name: Flutter Full Platform Release

on:
  push:
    tags:
      - '*' # 仅在推送 v 开头的 tag 时触发发布流程

jobs:
  # 1. 编译作业
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            command: flutter build apk --release
            output_path: build/app/outputs/flutter-apk/app-release.apk
            asset_name: app-release.apk

          - os: ubuntu-latest
            platform: linux
            command: flutter build linux --release
            output_path: build/linux/x64/release/bundle/
            asset_name: linux-x64-release.tar.gz

          - os: macos-latest
            platform: ios
            command: flutter build ios --release --no-codesign
            output_path: build/ios/iphoneos/Runner.app
            asset_name: ios-build.zip

          - os: macos-latest
            platform: macos
            command: flutter build macos --release
            output_path: build/macos/Build/Products/Release/*.app
            asset_name: macos-app.zip

          - os: windows-latest
            platform: windows
            command: flutter build windows --release
            output_path: build/windows/x64/runner/Release/*.exe
            asset_name: windows-installer.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # 如果是 Linux 平台，必须安装原生开发依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts libgtk-3-dev liblzma-dev libstdc++6 pkg-config ninja-build clang cmake

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 执行编译
      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.command }}

      # 产物后期处理（Linux 需打包为 tar.gz，macOS/iOS 需打包为 zip）
      - name: Prepare Artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "linux" ]; then
            tar -czf linux-x64-release.tar.gz -C build/linux/x64/release/bundle .
          elif [ "${{ matrix.platform }}" == "ios" ]; then
            zip -r ios-build.zip build/ios/iphoneos/Runner.app
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            # 这里的路径可能因项目配置略有差异，建议根据实际结果调整
            cd build/macos/Build/Products/Release/
            zip -r ../../../../macos-app.zip *.app
            cd ../../../..
          fi

      # 暂存产物
      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifact
          path: |
            ${{ matrix.output_path }}
            *.zip
            *.tar.gz

  # 2. 发布作业
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/*.apk
            ./artifacts/*.zip
            ./artifacts/*.tar.gz
            ./artifacts/*.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true