name: Flutter Full Platform Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            command: flutter build apk --release
            # 这里的 build_path 是为了方便后面移动文件
            build_path: build/app/outputs/flutter-apk/app-release.apk
            asset_name: app-release.apk

          - os: ubuntu-latest
            platform: linux
            command: flutter build linux --release
            build_path: build/linux/x64/release/bundle/
            asset_name: linux-x64.tar.gz

          - os: macos-latest
            platform: ios
            command: flutter build ios --release --no-codesign
            build_path: build/ios/iphoneos/Runner.app
            asset_name: ios-build.zip

          - os: macos-latest
            platform: macos
            command: flutter build macos --release
            build_path: build/macos/Build/Products/Release/
            asset_name: macos-app.zip

          - os: windows-latest
            platform: windows
            command: flutter build windows --release
            build_path: build/windows/runner/Release/
            asset_name: windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++6 pkg-config ninja-build clang cmake

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        run: ${{ matrix.command }}

      # 【核心优化】：统一将产物移动/压缩到当前工作目录根路径
      - name: Post Build - Prepare Artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "android" ]; then
            cp ${{ matrix.build_path }} ./${{ matrix.asset_name }}
          elif [ "${{ matrix.platform }}" == "linux" ]; then
            tar -czf ${{ matrix.asset_name }} -C ${{ matrix.build_path }} .
          elif [ "${{ matrix.platform }}" == "ios" ]; then
            zip -r ${{ matrix.asset_name }} ${{ matrix.build_path }}
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            # 进入目录压缩以避免包含多层 build/... 路径
            cd ${{ matrix.build_path }} && zip -r ../../../../${{ matrix.asset_name }} ./*.app && cd -
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            # Windows 环境下 bash 同样可用
            cd ${{ matrix.build_path }} && 7z a ../../../../${{ matrix.asset_name }} * && cd -
          fi

      # 此时只上传根目录下的最终文件
      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifact
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release_assets
          merge-multiple: true # 将所有并行的 build 产物下载到同一个文件夹中

      - name: List Files (Debug)
        run: ls -R ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # 现在的路径非常简单，全部在第一级目录
          files: |
            ./release_assets/*.apk
            ./release_assets/*.zip
            ./release_assets/*.tar.gz
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true